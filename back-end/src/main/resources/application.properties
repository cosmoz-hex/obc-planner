spring.application.name=back-end

# ======================
# Server Configuration
# ======================
server.port=${TOMCAT_PORT:8080}
server.servlet.context-path=/api

# ======================
# Database Configuration (PostgreSQL)
# ======================
# Décommenter la ligne suivante pour désactiver la connexion à la base de données
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================
# JPA/Hibernate Configuration
# ======================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ======================
# Flyway Configuration
# ======================
spring.flyway.enabled=true
#spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# ======================
# Logging Configuration
# ======================
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ======================
# DevTools Configuration
# ======================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ======================
# Security Configuration
# ======================
security.auth.enabled=${ENABLE_AUTH:true}
spring.security.user.password=disabled
jwt.secret=${JWT_SECRET}
jwt.issuer=${JWT_ISSUER}
jwt.expire=${JWT_EXPIRE}