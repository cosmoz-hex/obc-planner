<div class="p-6 font-sans">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">{{ 'title' | translate }}</h1>
    <div class="flex gap-2">
      <wa-button
        variant="text"
        [attr.appearance]="currentLanguage() === 'en' ? 'filled' : 'outlined'"
        (click)="setLanguage('en')">
        EN
      </wa-button>
      <wa-button
        variant="text"
        [attr.appearance]="currentLanguage() === 'fr' ? 'filled' : 'outlined'"
        (click)="setLanguage('fr')">
        FR
      </wa-button>
    </div>
  </div>

  <!-- Section Test API -->
  <section class="mt-6 p-5 border border-gray-200 rounded-lg shadow-sm">
    <h2 class="text-xl font-semibold text-gray-700 mb-4">Test API Backend</h2>

    <div class="flex gap-3 items-center">
      <wa-button
        variant="brand"
        [attr.loading]="loading() || null"
        [attr.disabled]="loading() || null"
        (click)="callTestApi()">
        {{ loading() ? ('api.loading' | translate) : ('api.test_button' | translate) }}
      </wa-button>
    </div>

    <!-- Succès -->
    @if (testResult()) {
      <wa-callout variant="success" class="mt-4 p-4">
        <strong>{{ 'api.success' | translate }} :</strong> {{ testResult()?.attr }}
      </wa-callout>
    }

    <!-- Erreur -->
    @if (error()) {
      <wa-callout variant="danger" class="mt-4 p-4">
        <strong>{{ 'api.error' | translate }} :</strong> {{ error() }}
      </wa-callout>
    }
  </section>

  <router-outlet></router-outlet>
</div>
