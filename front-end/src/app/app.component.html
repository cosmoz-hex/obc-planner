<div style="padding: 20px; font-family: Arial, sans-serif;">
  <h1>{{ title }}</h1>
  
  <section style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 4px;">
    <h2>Test API Backend</h2>
    
    <button 
      (click)="callTestApi()" 
      [disabled]="loading"
      style="padding: 8px 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
      {{ loading ? 'Chargement...' : 'Appeler l\'API' }}
    </button>

    <div *ngIf="testResult" style="margin-top: 15px; padding: 10px; background-color: #d4edda; border: 1px solid #c3e6cb; border-radius: 4px; color: #155724;">
      <strong>Succès :</strong> {{ testResult }}
    </div>

    <div *ngIf="error" style="margin-top: 15px; padding: 10px; background-color: #f8d7da; border: 1px solid #f5c6cb; border-radius: 4px; color: #721c24;">
      <strong>Erreur :</strong> {{ error }}
    </div>
  </section>

  <router-outlet></router-outlet>
</div>
